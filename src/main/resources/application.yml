spring:
  application:
    name: delivery-slots

  datasource:
    url: jdbc:h2:mem:deliveryslots
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration/{vendor}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html